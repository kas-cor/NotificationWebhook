name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Bump version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating versionName to $VERSION from tag $GITHUB_REF_NAME"
          sed -i 's/versionName ".*"/versionName "'"$VERSION"'"/' app/build.gradle

          CURRENT_CODE=$(grep 'versionCode' app/build.gradle | sed 's/.*versionCode *\([0-9]*\).*/\1/')
          NEW_CODE=$((CURRENT_CODE + 1))
          echo "Incrementing versionCode from $CURRENT_CODE to $NEW_CODE"
          sed -i 's/versionCode *[0-9]*/versionCode '"$NEW_CODE"'/' app/build.gradle

      - name: Commit version bump to main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          if git diff --cached --quiet; then
            echo "No changes to commit — already up to date"
          else
            git commit -m "Bump version to ${GITHUB_REF_NAME}"
            git push origin HEAD:refs/heads/main
          fi

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run lint checks
        run: ./gradlew lintRelease

      - name: Run unit tests
        run: ./gradlew test

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/html/
          retention-days: 14

      - name: Upload coverage report (XML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 14

      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          echo "name=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > notwebhook-release.jks
            echo "decoded=true" >> "$GITHUB_OUTPUT"
          else
            echo "decoded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Rename debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/NotifWebhook-${{ steps.version.outputs.name }}-debug.apk"

      - name: Rename release APK
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk \
               "app/build/outputs/apk/release/NotifWebhook-${{ steps.version.outputs.name }}.apk"
          fi
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk \
               "app/build/outputs/apk/release/NotifWebhook-${{ steps.version.outputs.name }}-unsigned.apk"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NotifWebhook-${{ steps.version.outputs.name }}-debug
          path: app/build/outputs/apk/debug/NotifWebhook-${{ steps.version.outputs.name }}-debug.apk
          retention-days: 7

      - name: Upload signed release APK
        if: steps.keystore.outputs.decoded == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NotifWebhook-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/NotifWebhook-${{ steps.version.outputs.name }}.apk
          retention-days: 30

      - name: Upload unsigned release APK (fallback)
        if: steps.keystore.outputs.decoded != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NotifWebhook-${{ steps.version.outputs.name }}-unsigned
          path: app/build/outputs/apk/release/NotifWebhook-${{ steps.version.outputs.name }}-unsigned.apk
          retention-days: 7

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: NotifWebhook-${{ needs.build.outputs.version }}
          path: /tmp/release-apk

      - name: Determine if APK is signed
        id: check_apk
        run: |
          APK_FILE=$(ls /tmp/release-apk/NotifWebhook-*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "apk_path=$APK_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes with changelog
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          PREV_TAG=$(git tag --sort=-version:refname | awk 'NR==2' || true)
          CURRENT_TAG="${GITHUB_REF_NAME}"

          build_changelog() {
            local range="$1"
            local result=""
            for HASH in $(git rev-list $range --no-merges 2>/dev/null); do
              FILES=$(git diff-tree --no-commit-id --name-only -r "$HASH" 2>/dev/null)
              NON_CI=$(echo "$FILES" | grep -vx '.github/workflows/ci.yml' || true)
              if [ -n "$NON_CI" ]; then
                MSG=$(git log --format="format:- %s" -1 "$HASH" 2>/dev/null)
                result="${result}${MSG}"$'\n'
              fi
            done
            echo "$result"
          }

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(build_changelog "${PREV_TAG}..${CURRENT_TAG}")
          else
            CHANGELOG=$(build_changelog "--max-count=40 HEAD")
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Первый релиз"
          fi

          NOTES=$(cat <<EOF
          ## NotifWebhook v${VERSION}

          ### Что нового
          ${CHANGELOG}

          ### Установка
          1. Скачайте APK
          2. Установите на устройство
          3. Предоставьте доступ к уведомлениям
          4. Отключите оптимизацию батареи
          5. Введите webhook URL и нажмите Сохранить
          EOF
          )
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          echo "body=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_apk.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: ${{ steps.check_apk.outputs.apk_path }}
          draft: false
          prerelease: false
